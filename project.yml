name: VimText
options:
  bundleIdPrefix: com.vimtext
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.35.0"
settings:
  SWIFT_VERSION: "5.9"
  MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  VimText:
    type: application
    platform: macOS
    sources:
      - VimText
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.vimtext.app
      PRODUCT_NAME: VimText
      INFOPLIST_FILE: VimText/Info.plist
      CODE_SIGN_ENTITLEMENTS: VimText/VimText.entitlements
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: 1
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      COMBINE_HIDPI_IMAGES: true
      CODE_SIGN_IDENTITY: "-"
      CODE_SIGN_STYLE: Automatic
      SWIFT_EMIT_LOC_STRINGS: true
